  <text x="470" y="34" text-anchor="middle" class="title">MoodMeal &#8212; current architecture</text>
  <text x="470" y="56" text-anchor="middle" class="sub">One Hermes agent running a self-funding food business &#183; chat + live business console</text>

  <!-- Surfaces -->
  <rect x="155" y="78" width="280" height="44" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="295" y="105" text-anchor="middle" class="bt">&#128421; Web app: chat + console (demo)</text>
  <rect x="500" y="78" width="285" height="44" rx="10" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="642" y="105" text-anchor="middle" class="bt">&#128172; WeChat / Telegram (real users)</text>

  <!-- pipeline boxes (cx 295, x 145 w 300) -->
  <rect x="145" y="150" width="300" height="52" rx="11" fill="#f3f4f6" stroke="#d1d5db" stroke-width="1.5"/>
  <text x="295" y="172" text-anchor="middle" class="bt">&#9312; User: "capek abis ujian &#183; ~&#165;20"</text>
  <text x="295" y="190" text-anchor="middle" class="desc">free-text mood + budget</text>

  <rect x="145" y="224" width="300" height="54" rx="11" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="295" y="246" text-anchor="middle" class="bt">&#9313; Hermes orchestrator &#8212; plans route</text>
  <text x="295" y="264" text-anchor="middle" class="lbl">memory + session_search (built-in)</text>

  <rect x="145" y="300" width="300" height="92" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="295" y="321" text-anchor="middle" class="bt">&#9314; delegate_task &#8594; 3 subagents</text>
  <rect x="153" y="332" width="92" height="28" rx="7" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
  <text x="199" y="350" text-anchor="middle" class="chip">Mood</text>
  <rect x="249" y="332" width="92" height="28" rx="7" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.4"/>
  <text x="295" y="350" text-anchor="middle" class="chip">Scout</text>
  <rect x="345" y="332" width="92" height="28" rx="7" fill="#ffffff" stroke="#22c55e" stroke-width="1.2"/>
  <text x="391" y="350" text-anchor="middle" class="chip">Health</text>
  <text x="295" y="380" text-anchor="middle" class="lbl">reasoned on Nemotron 3 Ultra &#183; NVIDIA</text>

  <rect x="145" y="414" width="300" height="54" rx="11" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="295" y="436" text-anchor="middle" class="bt">&#9315; clarify &#8594; 2 options, user Approves</text>
  <text x="295" y="454" text-anchor="middle" class="lbl">picks B &#183; &#165;16 (built-in consent)</text>

  <rect x="145" y="490" width="300" height="56" rx="11" fill="#fef3c7" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="295" y="513" text-anchor="middle" class="bt">&#9316; NemoClaw gate</text>
  <text x="295" y="531" text-anchor="middle" class="desc" fill="#b45309">&#165;16 &#8804; &#165;20 cap? &#9989;  (no charge unless PASS)</text>

  <rect x="145" y="568" width="300" height="56" rx="11" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="295" y="591" text-anchor="middle" class="bt">&#9317; Stripe &#8212; charge &#165;16</text>
  <text x="295" y="609" text-anchor="middle" class="desc" fill="#1d4ed8">hermes-webhook confirms payment</text>

  <rect x="145" y="646" width="300" height="60" rx="11" fill="#e2e8f0" stroke="#64748b" stroke-width="1.5"/>
  <text x="295" y="668" text-anchor="middle" class="bt">&#9318; Receipt in chat + memory saved</text>
  <text x="295" y="686" text-anchor="middle" class="lbl">next time &#8594; smarter</text>

