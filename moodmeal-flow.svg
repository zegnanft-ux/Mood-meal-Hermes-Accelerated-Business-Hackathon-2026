    <marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#9ca3af" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <marker id="arb" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#3b82f6" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
    <style>
      .title{font-size:21px;font-weight:700;fill:#111827}
      .sub{font-size:13px;font-weight:400;fill:#6b7280}
      .bt{font-size:14px;font-weight:600;fill:#111827}
      .desc{font-size:11.5px;font-weight:400;fill:#4b5563}
      .chip{font-size:12px;font-weight:600;fill:#111827}
      .lbl{font-size:11px;font-weight:600;fill:#6b7280}
