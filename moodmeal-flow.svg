  <rect x="560" y="734" width="14" height="14" rx="3" fill="#ffffff" stroke="#8b5cf6" stroke-width="1.4"/>
  <text x="580" y="745" class="leg">&#129513; MoodMeal skill (you build)</text>

  <text x="470" y="784" text-anchor="middle" class="sub">You build: 1 SKILL.md + 4 Python tools + a thin web console. Everything else &#8212; chat, memory, subagents, consent, webhooks &#8212; is Hermes.</text>
