  <line x1="295" y1="122" x2="295" y2="148" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="642" y1="122" x2="320" y2="148" stroke="#9ca3af" stroke-width="1.6" stroke-dasharray="5 4" marker-end="url(#ar)"/>
  <line x1="295" y1="202" x2="295" y2="222" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="295" y1="278" x2="295" y2="298" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="295" y1="392" x2="295" y2="412" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="295" y1="468" x2="295" y2="488" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="295" y1="546" x2="295" y2="566" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="295" y1="624" x2="295" y2="644" stroke="#9ca3af" stroke-width="2" marker-end="url(#ar)"/>

  <!-- skill bracket -->
  <path d="M468,300 H478 V624 H468" fill="none" stroke="#8b5cf6" stroke-width="1.6" stroke-dasharray="5 4"/>
  <line x1="445" y1="346" x2="468" y2="346" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="445" y1="518" x2="468" y2="518" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <line x1="445" y1="596" x2="468" y2="596" stroke="#8b5cf6" stroke-width="1.2" stroke-dasharray="4 3"/>
  <text x="496" y="462" text-anchor="middle" class="lbl" fill="#7c3aed" transform="rotate(90 496 462)">&#129513; MoodMeal skill &#8212; you build (search_menu &#183; check_spend_limit &#183; charge_wallet &#183; topup)</text>

  <!-- Economy panel -->
  <rect x="540" y="224" width="360" height="400" rx="16" fill="#f8fafc" stroke="#cbd5e1" stroke-width="1.5" stroke-dasharray="7 5"/>
  <text x="720" y="247" text-anchor="middle" class="panel">Agent economy &#8212; self-funding via Stripe</text>

  <rect x="560" y="262" width="320" height="80" rx="11" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="576" y="284" class="bt">&#128181; EARN ($ IN)</text>
  <text x="576" y="306" class="money" fill="#15803d">subscription&#160;&#160;&#160;&#160;+&#165;120</text>
  <text x="576" y="326" class="money" fill="#15803d">per-order fee&#160;&#160;&#160;+&#165;18</text>

  <rect x="560" y="356" width="320" height="98" rx="11" fill="#fff5f5" stroke="#f87171" stroke-width="1.5"/>
  <text x="576" y="378" class="bt">&#128184; SPEND ($ OUT)</text>
  <text x="576" y="400" class="money" fill="#b91c1c">food orders&#160;&#160;&#160;&#160;&#8722;&#165;64</text>
  <text x="576" y="420" class="money" fill="#b91c1c">Nemotron / LLM&#160;&#160;&#8722;&#165;9</text>
  <text x="576" y="440" class="money" fill="#b91c1c">API / VPS&#160;&#160;&#160;&#160;&#160;&#160;&#8722;&#165;12</text>

  <rect x="560" y="468" width="320" height="58" rx="11" fill="#ecfdf5" stroke="#22c55e" stroke-width="2"/>
  <text x="720" y="492" text-anchor="middle" class="bt" fill="#065f46">&#128200; NET +&#165;53 / week &#183; self-funding &#9989;</text>
  <text x="720" y="512" text-anchor="middle" class="lbl" fill="#047857">revenue covers its own compute &#8212; the loop closes</text>

  <text x="720" y="552" text-anchor="middle" class="lbl">&#128737; NemoClaw: 0 breaches &#183; last &#165;16 / &#165;20</text>
  <text x="720" y="574" text-anchor="middle" class="lbl">streams live to the console via hermes-api-server</text>
  <text x="720" y="596" text-anchor="middle" class="lbl">earn + spend both flow through Stripe</text>

  <!-- stripe -> economy arrow -->
  <line x1="445" y1="596" x2="538" y2="470" stroke="#3b82f6" stroke-width="1.8" stroke-dasharray="5 4" marker-end="url(#arb)"/>

