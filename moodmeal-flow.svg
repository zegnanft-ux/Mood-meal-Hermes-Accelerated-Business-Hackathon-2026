  <rect x="335" y="734" width="14" height="14" rx="3" fill="#fef3c7" stroke="#f59e0b"/>
  <text x="355" y="745" class="leg">NemoClaw guard</text>
  <rect x="475" y="734" width="14" height="14" rx="3" fill="#dbeafe" stroke="#3b82f6"/>
